<body>
    <h1>単元テストカレンダー</h1>
    <main>
        <p id="guide">学年とクラスを選択してください</p>
        <div class="card">
            <form method="GET" id="form" class="form">
                <input type="hidden" name="action" value="getCalender">
                <select name="userGrade">
                    <option value="0">選択</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>

                <span>年</span>

                <select name="userClass">
                    <option value="0">選択</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>

                <span>組</span>

                <input type="submit" value="検索">
            </form>

            <div class="hide" id="status"></div>
        </div>
        <img style="height: 30vh;" class="hide" id="QRcode-img" src="img/QR.png">
    </main>
    <footer>
        <div style="text-align: end;">
            <label>
                <input type="checkbox" style="appearance: none;" id="QRcode-box"
                    onchange="toggleElementHide(document.getElementById('QRcode-img'))"></input>
                <span class="drop material-icons">qr_code_2</span>
            </label>
        </div>
        <p>このサービスは個人が制作した非公式のサービスです。</p>
